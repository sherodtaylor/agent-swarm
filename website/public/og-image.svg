<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <style>
      .h1 { font: 700 76px 'JetBrains Mono', ui-monospace, Menlo, monospace; fill: #d4d7dc; }
      .h1-accent { font: 700 76px 'JetBrains Mono', ui-monospace, Menlo, monospace; fill: #5fbf8d; }
      .sub { font: 400 28px 'JetBrains Mono', ui-monospace, Menlo, monospace; fill: #7a818c; }
      .mono { font: 400 22px 'JetBrains Mono', ui-monospace, Menlo, monospace; fill: #7a818c; }
      .name { font: 700 24px 'JetBrains Mono', ui-monospace, Menlo, monospace; fill: #d4d7dc; }
    </style>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="#0b0d10"/>

  <!-- subtle elevated band along the bottom for "terminal floor" feel -->
  <rect x="0" y="556" width="1280" height="84" fill="#13171b"/>

  <!-- top-left brand mark / shell prompt -->
  <text x="80" y="120" class="mono">$ agent-smith</text>

  <!-- headline (two lines) -->
  <text x="80" y="220" class="h1">your sandbox</text>
  <text x="80" y="304" class="h1">workforce of</text>
  <text x="80" y="388" class="h1-accent">AI engineers.</text>

  <!-- sub-tagline -->
  <text x="80" y="448" class="sub">a framework for force-multiplier agents</text>

  <!-- footer URL -->
  <text x="80" y="608" class="mono">github.com/sherodtaylor/agent-smith</text>

  <!-- right-side sprites: InfraBot + DevBot, scaled and labelled -->
  <g transform="translate(720 360) scale(14)" color="#d4d7dc">
    <g fill="currentColor"><rect x="6" y="0" width="4" height="1"/><rect x="4" y="1" width="8" height="1"/><rect x="3" y="2" width="10" height="1"/><rect x="2" y="3" width="12" height="1"/><rect x="4" y="4" width="1" height="3"/><rect x="11" y="4" width="1" height="3"/><rect x="7" y="6" width="2" height="1"/><rect x="5" y="7" width="6" height="1"/><rect x="2" y="8" width="12" height="1"/><rect x="2" y="9" width="1" height="3"/><rect x="13" y="9" width="1" height="3"/><rect x="2" y="12" width="12" height="1"/><rect x="4" y="13" width="2" height="2"/><rect x="10" y="13" width="2" height="2"/></g><g fill="#d4a85f"><rect x="3" y="3" width="10" height="1"/><rect x="6" y="5" width="1" height="1"/><rect x="9" y="5" width="1" height="1"/><rect x="7" y="10" width="2" height="1"/></g>
  </g>
  <text x="832" y="616" text-anchor="middle" class="name">InfraBot</text>

  <g transform="translate(976 360) scale(14)" color="#d4d7dc">
    <g fill="currentColor"><rect x="5" y="1" width="6" height="1"/><rect x="4" y="2" width="8" height="1"/><rect x="3" y="3" width="10" height="1"/><rect x="4" y="4" width="1" height="3"/><rect x="11" y="4" width="1" height="3"/><rect x="5" y="7" width="6" height="1"/><rect x="3" y="8" width="10" height="1"/><rect x="3" y="9" width="1" height="3"/><rect x="12" y="9" width="1" height="3"/><rect x="3" y="12" width="10" height="1"/><rect x="5" y="13" width="2" height="2"/><rect x="9" y="13" width="2" height="2"/></g><g fill="#5fbf8d"><rect x="6" y="5" width="1" height="1"/><rect x="9" y="5" width="1" height="1"/><rect x="7" y="9" width="2" height="1"/><rect x="7" y="10" width="1" height="1"/><rect x="8" y="11" width="1" height="1"/></g>
  </g>
  <text x="1088" y="616" text-anchor="middle" class="name">DevBot</text>
</svg>
